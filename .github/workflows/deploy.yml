name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [closed]
    branches: [dev]

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Build config.js from secrets
        run: |
          cat > config.js <<'JS'
          window.APPOSITE_CONFIG = {
            company:   "${{ secrets.SITE_COMPANY }}",
            email:     "${{ secrets.CONTACT_EMAIL }}",
            // phone:     "${{ secrets.CONTACT_PHONE }}",
            // phoneHref: "${{ secrets.CONTACT_PHONE_HREF }}",
            domain:    "${{ secrets.SITE_DOMAIN }}",
            url:       "${{ secrets.SITE_URL }}",

            // social: {
            //   linkedin: "${{ secrets.LINKEDIN_URL }}",
            // }
          };
          JS

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: apposite-solutions-website
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}

  cleanup-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Delete old production deployments (keep 5)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DEPLOYMENTS=$(wrangler pages deployment list \
            --project-name apposite-solutions-website \
            --json 2>/dev/null \
            | jq -r '[.[] | select(.deployment_trigger.metadata.branch == "main")] | sort_by(.created_on) | reverse | .[5:] | .[].id')

          for id in $DEPLOYMENTS; do
            echo "Deleting deployment $id"
            wrangler pages deployment delete "$id" \
              --project-name apposite-solutions-website \
              --yes 2>/dev/null || echo "Could not delete $id (may be aliased)"
          done

  cleanup-pr-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Delete preview deployments for merged branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH: ${{ github.head_ref }}
        run: |
          DEPLOYMENTS=$(wrangler pages deployment list \
            --project-name apposite-solutions-website \
            --json 2>/dev/null \
            | jq -r --arg branch "$BRANCH" '[.[] | select(.deployment_trigger.metadata.branch == $branch)] | .[].id')

          for id in $DEPLOYMENTS; do
            echo "Deleting preview deployment $id for branch $BRANCH"
            wrangler pages deployment delete "$id" \
              --project-name apposite-solutions-website \
              --yes 2>/dev/null || echo "Could not delete $id"
          done
