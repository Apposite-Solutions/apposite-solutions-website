name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build config.js from secrets
        run: |
          cat > config.js <<'JS'
          window.APPOSITE_CONFIG = {
            company:   "${{ secrets.SITE_COMPANY }}",
            email:     "${{ secrets.CONTACT_EMAIL }}",
            // phone:     "${{ secrets.CONTACT_PHONE }}",
            // phoneHref: "${{ secrets.CONTACT_PHONE_HREF }}",
            domain:    "${{ secrets.SITE_DOMAIN }}",
            url:       "${{ secrets.SITE_URL }}",

            // social: {
            //   linkedin: "${{ secrets.LINKEDIN_URL }}",
            // }
          };
          JS

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: apposite-solutions-website
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
